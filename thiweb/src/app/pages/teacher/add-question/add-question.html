<nz-card nzTitle="Soạn câu hỏi trắc nghiệm">
  <div class="form-container">
    <label>Nội dung câu hỏi:</label>
    <textarea nz-input [(ngModel)]="questionContent" [nzAutosize]="{ minRows: 3 }" placeholder="Ví dụ: 1 + 1 bằng mấy?"></textarea>

    <div style="margin-top: 20px;">
      <label>Danh sách đáp án (Tích chọn ô bên cạnh để đánh dấu đáp án đúng):</label>
      <nz-radio-group [(ngModel)]="correctIdx" style="width: 100%;">

        <div nz-row [nzGutter]="[16, 16]" style="margin-top: 10px;">
          <!-- Đáp án 1 -->
          <div nz-col nzSpan="24">
            <nz-input-group [nzPrefix]="radio1">
              <input type="text" nz-input [(ngModel)]="opt1" placeholder="Nhập đáp án A" />
            </nz-input-group>
            <ng-template #radio1><label nz-radio [nzValue]="1">A</label></ng-template>
          </div>

          <!-- Đáp án 2 -->
          <div nz-col nzSpan="24">
            <nz-input-group [nzPrefix]="radio2">
              <input type="text" nz-input [(ngModel)]="opt2" placeholder="Nhập đáp án B" />
            </nz-input-group>
            <ng-template #radio2><label nz-radio [nzValue]="2">B</label></ng-template>
          </div>

          <!-- Đáp án 3 -->
          <div nz-col nzSpan="24">
            <nz-input-group [nzPrefix]="radio3">
              <input type="text" nz-input [(ngModel)]="opt3" placeholder="Nhập đáp án C" />
            </nz-input-group>
            <ng-template #radio3><label nz-radio [nzValue]="3">C</label></ng-template>
          </div>

          <!-- Đáp án 4 -->
          <div nz-col nzSpan="24">
            <nz-input-group [nzPrefix]="radio4">
              <input type="text" nz-input [(ngModel)]="opt4" placeholder="Nhập đáp án D" />
            </nz-input-group>
            <ng-template #radio4><label nz-radio [nzValue]="4">D</label></ng-template>
          </div>
        </div>

      </nz-radio-group>
    </div>

    <div style="margin-top: 30px; text-align: center;">
      <button nz-button nzType="primary" nzSize="large" (click)="onSubmit()">
        <span nz-icon nzType="save"></span> Lưu câu hỏi
      </button>
      <button nz-button nzType="default" nzSize="large" style="margin-left: 10px;" routerLink="/teacher/manage-exams">
        Hoàn tất
      </button>
    </div>
  </div>
</nz-card>
