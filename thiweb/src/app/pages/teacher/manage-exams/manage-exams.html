<!-- Nút bấm đặt ở góc trên bên phải hoặc phía trên bảng -->
<div style="margin-bottom: 16px; text-align: right;">
  <button nz-button nzType="primary" (click)="showModal()">
    <span nz-icon nzType="plus"></span> Thêm đề thi mới
  </button>
</div>

<!-- Modal chứa Form tạo đề -->
<nz-modal [(nzVisible)]="isVisible" nzTitle="Tạo đề thi mới" (nzOnCancel)="handleCancel()" (nzOnOk)="handleOk()" [nzOkLoading]="isConfirmLoading">
  <ng-container *nzModalContent>
    <form nz-form nzLayout="vertical">
      <nz-form-item>
        <nz-form-label>Tên đề thi</nz-form-label>
        <nz-form-control>
          <input nz-input [(ngModel)]="newExam.title" name="title" placeholder="Nhập tên đề thi" />
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-label>Mô tả</nz-form-label>
        <nz-form-control>
          <textarea nz-input [(ngModel)]="newExam.description" name="description" placeholder="Mô tả ngắn gọn"></textarea>
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-label>Thời gian làm bài (phút)</nz-form-label>
        <nz-form-control>
          <nz-input-number [(ngModel)]="newExam.duration" name="duration" [nzMin]="1" [nzStep]="1" style="width: 100%"></nz-input-number>
        </nz-form-control>
      </nz-form-item>
    </form>
  </ng-container>
</nz-modal>
<nz-table #basicTable [nzData]="exams" nzBordered>
  <thead>
  <tr>
    <th>Tên đề thi</th>
    <th>Thời lượng</th>
    <th>Trạng thái</th>
    <th nzWidth="300px">Thao tác</th>
  </tr>
  </thead>
  <tbody>
  <!-- Sử dụng cú pháp @for mới thay cho *ngFor -->
    @for (data of exams; track data.id) {
      <tr>
        <td>{{ data.title }}</td>
        <td>{{ data.duration }} phút</td>
        <td>
          <nz-tag [nzColor]="data.active ? 'green' : 'red'">
            {{ data.active ? 'Đang mở' : 'Đã đóng' }}
          </nz-tag>
        </td>
        <td>
          <!-- Nút thêm câu hỏi -->
          <a nz-button nzType="link" [routerLink]="['/teacher/add-question', data.id]">
            <span nz-icon nzType="plus-circle"></span> Thêm câu hỏi
          </a>

          <nz-divider nzType="vertical"></nz-divider>

          <!-- Nút xem thống kê -->
          <a nz-button nzType="link" [routerLink]="['/teacher/stats', data.id]">
            <span nz-icon nzType="bar-chart"></span> Xem thống kê
          </a>

          <nz-divider nzType="vertical"></nz-divider>

          <!-- Nút xóa -->
          <button nz-button nzType="link" nzDanger (click)="onDelete(data.id)">
            <span nz-icon nzType="delete"></span> Xóa
          </button>
        </td>
      </tr>
    } @empty {
      <!-- Hiển thị khi danh sách exams trống -->
      <tr>
        <td colspan="4" style="text-align: center;">
          <nz-empty nzNotFoundContent="Chưa có đề thi nào được tạo"></nz-empty>
        </td>
      </tr>
    }
  </tbody>
</nz-table>
